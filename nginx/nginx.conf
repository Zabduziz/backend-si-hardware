# nginx/nginx.conf file

server {
    # Nginx listen di port 80 (HTTP)
    listen 80;
    server_name relawanmate.site;

    # Semua request akan diteruskan ke service 'backend' di port 3000
    location / {
        # 'backend' adalah nama service di docker-compose
        proxy_pass http://backend:3000;
        
        # Header standar untuk reverse proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Tambahan untuk websocket jika dibutuhkan, tapi ini nggak ada.
    }
    
    # Optional: Jika lo mau Nginx yang serve file uploads secara langsung,
    # lo bisa tambahin config di sini. Tapi di setup ini, biarin Node.js yang handle dulu.
}